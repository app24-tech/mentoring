<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mentoring Management System</title>

  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    /* Top bar */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      z-index: 1000;
      color: #fff;
    }

    .title {
      font-size: 14px;
      font-weight: bold;
    }

    .btn {
      background: #1e88e5;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* Iframe container */
    .frame-container {
      position: absolute;
      top: 50px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Fullscreen mode styling */
    .fullscreen iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
    }

    .fullscreen .topbar {
      display: none;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="title">Mentoring System</div>
    <button class="btn" onclick="toggleFullscreen()">Fullscreen</button>
  </div>

  <!-- IFRAME -->
  <div class="frame-container">
    <iframe 
      src="https://script.google.com/macros/s/AKfycbysoiZVVcD9PF76YsThFX8s0-aRU9H-ymOvV_jhGw07WHSmfioOYAlfqqrqqp-t8HXo/exec"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    function toggleFullscreen() {
      const body = document.body;

      if (!document.fullscreenElement) {
        // Try native fullscreen first
        body.requestFullscreen?.().catch(() => {
          // fallback: CSS fullscreen
          body.classList.add('fullscreen');
        });
      } else {
        document.exitFullscreen?.();
        body.classList.remove('fullscreen');
      }
    }

    // Improve mobile experience: lock scroll
    document.addEventListener('touchmove', function(e) {
      if (!document.fullscreenElement) e.preventDefault();
    }, { passive: false });
  </script>

</body>
</html>
