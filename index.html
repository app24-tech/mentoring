<!DOCTYPE html>
<html>
<head>
  <title>Mentoring Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
    }
    
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      margin: 0;
      padding: 0;
      display: block;
    }
    
    /* Khusus untuk mobile agar menutupi notch/dynamic island */
    @supports (padding: max(0px)) {
      iframe {
        width: 100vw;
        height: 100vh;
      }
    }
    
    /* Fallback untuk iOS lama */
    @media screen and (max-width: 768px) {
      iframe {
        height: 100vh;
        height: -webkit-fill-available;
      }
      body {
        height: -webkit-fill-available;
      }
    }
  </style>
</head>
<body>
  <iframe src="https://script.google.com/macros/s/AKfycbysoiZVVcD9PF76YsThFX8s0-aRU9H-ymOvV_jhGw07WHSmfioOYAlfqqrqqp-t8HXo/exec" 
    allow="fullscreen" 
    loading="eager">
  </iframe>
</body>
</html>
